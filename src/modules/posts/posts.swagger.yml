paths:
  /api/posts:
    get:
      tags:
        - Posts
      summary: Returns all posts
      parameters:
        - name: pageNumber
          in: query
          description: pageNumber is number of portions that should be returned
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: pageSize is portions size that should be returned
          schema:
            type: integer
            default: 10
        - name: sortBy
          in: query
          schema:
            allOf:
              - $ref: '#/components/schemas/SortPostsBy'
              - default: createdAt
        - name: sortDirection
          in: query
          schema:
            allOf:
              - $ref: '#/components/schemas/SortDirections'
              - default: desc
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPostJsonApiResponse'
    post:
      tags:
        - Posts
      summary: Create new post
      security:
        - basic: []
      requestBody:
        required: true
        description: Data for constructing new post entity
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputModels.CreatePostInputModel'
      responses:
        '201':
          description: Returns the newly created post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SinglePostJsonApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Unauthorized

  /api/posts/{id}:
    get:
      tags:
        - Posts
      summary: Return post by id
      parameters:
        - name: id
          in: path
          required: true
          description: Id of existing post
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SinglePostJsonApiResponse'
        '404':
          description: Not Found
    put:
      tags:
        - Posts
      summary: Update existing post by id with InputModel
      security:
        - basic: []
      parameters:
        - name: id
          in: path
          required: true
          description: id
          schema:
            type: string
      requestBody:
        required: true
        description: Data for updating
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputModels.UpdatePostInputModel'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      tags:
        - Posts
      summary: Delete post specified by id
      security:
        - basic: []
      parameters:
        - name: id
          in: path
          required: true
          description: Post id
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '404':
          description: Not Found

  /api/posts/{postId}/comments:
    get:
      tags:
        - Posts
      summary: Returns comments for specified post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - name: pageNumber
          in: query
          description: pageNumber is number of portions that should be returned
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: pageSize is portions size that should be returned
          schema:
            type: integer
            default: 10
        - name: sortBy
          in: query
          schema:
            allOf:
              - $ref: '#/components/schemas/SortPostCommentsBy'
              - default: createdAt
        - name: sortDirection
          in: query
          schema:
            allOf:
              - $ref: '#/components/schemas/SortDirections'
              - default: desc
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCommentJsonApiResponse'
        '404':
          description: If post for passed postId doesn't exist
    post:
      tags:
        - Posts
      summary: Create new comment
      security:
        - bearer: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: Data for constructing new post entity
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputModels.CreateCommentInputModel'
      responses:
        '201':
          description: Returns the newly created post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleCommentJsonApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Unauthorized
        '404':
          description: If post with specified postId doesn't exists

  /api/posts/{postId}/like-status:
    put:
      tags:
        - Posts
      summary: Make like/unlike/dislike/undislike operation
      security:
        - bearer: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        description: Like model for make like/dislike/reset operation
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputModels.UpdateLikeStatusInputModel'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
