paths:
  /api/posts:
    get:
      tags:
        - Posts
      summary: Get posts list
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJsonApiResponse'
    post:
      tags:
        - Posts
      summary: Create post
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleJsonApiResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized

  /api/posts/{id}:
    get:
      tags:
        - Posts
      summary: Get post by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleJsonApiResponse'
        '404':
          description: Not Found
    put:
      tags:
        - Posts
      summary: Update post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      tags:
        - Posts
      summary: Delete post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '404':
          description: Not Found

  /api/posts/{postId}/comments:
    get:
      tags:
        - Posts
      summary: Get comments of post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedJsonApiResponse'
        '404':
          description: Not Found
    post:
      tags:
        - Posts
      summary: Create comment in post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleJsonApiResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found

  /api/posts/{postId}/like-status:
    put:
      tags:
        - Posts
      summary: Update post like status
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
