paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Try login user to the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputModels.SigninInputModel'
            example:
              loginOrEmail: string
              password: string
      responses:
        '200':
          description: '{{JWT_TOKEN_PAIR_RESPONSE}}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewModels.AccessTokenViewModel'
        '400':
          description: If the inputModel has incorrect values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
        '401':
          description: If the password or login is wrong
        '429':
          description: More than 5 attempts from one IP-address during 10 seconds

  /api/auth/password-recovery:
    post:
      tags:
        - Auth
      summary: Password recovery via Email confirmation. Email should be sent with RecoveryCode inside
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputModels.RecoveryPasswordInputModel'
            example:
              email: useremail@company.com
      responses:
        '204':
          description: Even if current email is not registered (for prevent user's email detection)
        '400':
          description: If the inputModel has invalid email (for example 222^gmail.com)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
        '429':
          description: More than 5 attempts from one IP-address during 10 seconds

  /api/auth/new-password:
    post:
      tags:
        - Auth
      summary: Confirm Password recovery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputModels.NewPasswordInputModel'
            example:
              newPassword: string
              recoveryCode: string
      responses:
        '204':
          description: If code is valid and new password is accepted
        '400':
          description: If the inputModel has incorrect value (for incorrect password length) or RecoveryCode is incorrect or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
        '429':
          description: More than 5 attempts from one IP-address during 10 seconds

  /api/auth/refresh-token:
    post:
      tags:
        - Auth
      summary: Generate new pair of access and refresh tokens (in cookie client must send correct refreshToken that will be revoked after refreshing) Device LastActiveDate should be overrode by issued Date of new refresh token
      security:
        - refreshToken: []
      responses:
        '200':
          description: '{{JWT_TOKEN_PAIR_RESPONSE}}'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewModels.AccessTokenViewModel'
        '401':
          description: Unauthorized

  /api/auth/registration-confirmation:
    post:
      tags:
        - Auth
      summary: Confirm registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputModels.RegistrationConfirmInputModel'
            example:
              code: string
      responses:
        '204':
          description: Email was verified. Account was activated
        '400':
          description: If the confirmation code is incorrect, expired or already been applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
        '429':
          description: More than 5 attempts from one IP-address during 10 seconds

  /api/auth/registration:
    post:
      tags:
        - Auth
      summary: Registration in the system. Email with confirmation code will be send to passed email address
      requestBody:
        required: true
        description: Data for registration
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputModels.SignupInputModel'
            example:
              login: Ts7ElAsorT
              password: string
              email: example@example.dev
      responses:
        '204':
          description: Input data is accepted. Email with confirmation code will be send to passed email address
        '400':
          description: If the inputModel has incorrect values (in particular if the user with the given email or login already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
        '429':
          description: More than 5 attempts from one IP-address during 10 seconds

  /api/auth/registration-email-resending:
    post:
      tags:
        - Auth
      summary: Resend confirmation registration Email if user exists
      requestBody:
        required: true
        description: Data for constructing new user
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InputModels.ResendRegistrationInputModel'
            example:
              email: example@example.com
      responses:
        '204':
          description: >-
            Input data is accepted. Email with confirmation code will be send to passed email address.
            Confirmation code should be inside link as query param, for example:
            https://some-front.com/confirm-registration?code=yourcodehere
        '400':
          description: If the inputModel has incorrect values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIErrorResult'
        '429':
          description: More than 5 attempts from one IP-address during 10 seconds

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: In cookie client must send correct refreshToken that will be revoked
      security:
        - refreshToken: []
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized

  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get information about current user
      security:
        - bearer: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewModels.MeViewModel'
              example:
                email: string
                login: string
                userId: string
        '401':
          description: Unauthorized
